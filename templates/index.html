<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBRL 체크리스트 검토 도구</title>
<style>
:root {
  --primary: #0d2345;
  --primary-l: #1a3a6e;
  --accent: #2563eb;
  --accent-h: #1d4ed8;
  --success: #16a34a;
  --danger: #dc2626;
  --warn: #d97706;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','맑은 고딕',-apple-system,sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--primary); color: #fff;
  padding: 14px 32px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
header .logo { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
header .sub  { font-size: 12px; color: #94a3b8; margin-top: 2px; }
header .badge {
  margin-left: auto; background: rgba(255,255,255,.12);
  padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #cbd5e1;
}

/* ── Layout ── */
.wrap { max-width: 1440px; margin: 0 auto; padding: 24px 20px; }
.cols { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }

/* ── Card ── */
.card {
  background: var(--card); border-radius: var(--r);
  border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06);
  padding: 20px;
}
.card-title {
  font-size: 13px; font-weight: 700; color: var(--primary);
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}

/* ── 업로드 영역 ── */
.upload-zone {
  border: 2px dashed #cbd5e1; border-radius: var(--r);
  padding: 28px 16px; text-align: center; cursor: pointer;
  transition: all .2s; background: #f8fafc;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #eff6ff; }
.upload-zone .icon { font-size: 34px; margin-bottom: 8px; }
.upload-zone .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
#fileInput { display: none; }
.file-name {
  margin-top: 10px; font-size: 12px; color: var(--accent);
  font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.btn {
  width: 100%; padding: 11px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; margin-top: 12px; }
.btn-primary:hover:not(:disabled) { background: var(--accent-h); }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-export {
  background: #16a34a; color: #fff; margin-top: 10px; padding: 9px;
  font-size: 13px;
}
.btn-export:hover { background: #15803d; }

/* ── 요약 카드 ── */
.summary-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 16px;
}
.stat {
  background: #f8fafc; border-radius: 8px;
  border: 1px solid var(--border); padding: 12px; text-align: center;
}
.stat .val { font-size: 24px; font-weight: 800; color: var(--primary); }
.stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.stat.warn .val { color: var(--danger); }

/* ── 카테고리 탭 ── */
.cat-tabs {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
}
.cat-tab {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: var(--card); transition: all .15s;
  white-space: nowrap;
}
.cat-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.cat-tab .cnt {
  display: inline-block; background: rgba(0,0,0,.12);
  border-radius: 10px; padding: 0 6px; font-size: 11px; margin-left: 4px;
}
.cat-tab.active .cnt { background: rgba(255,255,255,.25); }

/* ── 체크 목록 ── */
.check-list { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; cursor: pointer; transition: box-shadow .15s;
}
.check-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.check-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--card);
}
.check-id {
  font-size: 11px; font-weight: 700; color: #fff;
  background: var(--primary); padding: 2px 8px; border-radius: 4px;
  min-width: 38px; text-align: center;
}
.check-title { flex: 1; font-size: 13px; font-weight: 600; }
.badge-cnt {
  font-size: 12px; font-weight: 700; padding: 2px 10px;
  border-radius: 12px; white-space: nowrap;
}
.badge-ok   { background: #dcfce7; color: #15803d; }
.badge-err  { background: #fee2e2; color: #991b1b; }
.check-arrow { font-size: 11px; color: var(--muted); transition: transform .2s; }
.check-item.open .check-arrow { transform: rotate(180deg); }

/* ── 체크 상세 ── */
.check-detail { display: none; }
.check-item.open .check-detail { display: block; }
.check-desc {
  font-size: 11px; color: var(--muted); padding: 8px 14px;
  background: #f8fafc; border-top: 1px solid var(--border);
  line-height: 1.6;
}

/* ── 이슈 테이블 ── */
.issue-table-wrap { overflow-x: auto; }
table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
th {
  background: var(--primary); color: #fff; padding: 7px 8px;
  text-align: left; white-space: nowrap; font-weight: 600;
  position: sticky; top: 0; z-index: 1;
}
td {
  padding: 6px 8px; border-bottom: 1px solid var(--border);
  max-width: 220px; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; vertical-align: middle;
}
tr:hover td { background: #f0f9ff; }
.tag {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 10px; font-weight: 600;
}
.tag-c { background: #dbeafe; color: #1d4ed8; }
.tag-s { background: #fce7f3; color: #9d174d; }
.tag-d { background: #e0e7ff; color: #4338ca; }

/* ── 더보기 ── */
.more-btn {
  width: 100%; padding: 8px; background: #f8fafc;
  border: none; border-top: 1px solid var(--border);
  cursor: pointer; font-size: 11px; color: var(--muted);
  transition: background .15s;
}
.more-btn:hover { background: #f1f5f9; }

/* ── Spinner ── */
.spinner-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 9999;
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
.spinner-overlay.show { display: flex; }
.spinner {
  width: 50px; height: 50px;
  border: 5px solid rgba(255,255,255,.25);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spin-msg { color: #fff; font-size: 14px; font-weight: 600; }

/* ── 오류 ── */
.error-box {
  background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px;
  padding: 12px 16px; font-size: 12px; color: #991b1b;
  white-space: pre-wrap; display: none;
}
.error-box.show { display: block; }

/* ── 반응형 ── */
@media (max-width: 900px) {
  .cols { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⬡ XBRL 체크리스트 검토 도구</div>
    <div class="sub">IxD 편집기 구조내려받기 파일 전용</div>
  </div>
  <div class="badge">29개 체크 항목</div>
</header>

<div class="wrap">
<div class="cols">

<!-- ── 좌측: 업로드 패널 ── -->
<div>
  <div class="card">
    <div class="card-title">📂 파일 업로드</div>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📄</div>
      <div style="font-size:13px;font-weight:600;">xlsx 파일을 드래그하거나 클릭</div>
      <div class="hint">IxD 편집기 → [구조내려받기] → .xlsx</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx">

    <button class="btn btn-primary" id="runBtn" disabled onclick="runCheck()">
      ▶ 실행
    </button>
    <button class="btn btn-export" id="exportBtn" style="display:none" onclick="exportExcel()">
      ⬇ Excel 결과 내보내기
    </button>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- 요약 -->
  <div class="card" id="summaryCard" style="margin-top:16px;display:none">
    <div class="card-title">📊 검토 요약</div>
    <div class="summary-grid">
      <div class="stat"><div class="val" id="sTotalChecks">-</div><div class="lbl">전체 체크</div></div>
      <div class="stat warn"><div class="val" id="sTotalIssues">-</div><div class="lbl">검출 건수</div></div>
      <div class="stat warn"><div class="val" id="sChecksWithIssues">-</div><div class="lbl">이상 항목</div></div>
    </div>
    <div style="font-size:12px;color:var(--muted);line-height:1.7" id="sCompanyInfo"></div>
  </div>
</div>

<!-- ── 우측: 결과 패널 ── -->
<div>
  <div class="card" id="resultCard" style="display:none">
    <div class="card-title">🔍 체크리스트 결과</div>

    <!-- 카테고리 탭 -->
    <div class="cat-tabs" id="catTabs"></div>

    <!-- 체크 목록 -->
    <div class="check-list" id="checkList"></div>
  </div>

  <div style="padding:60px;text-align:center;color:var(--muted);font-size:13px"
       id="emptyState">
    좌측에서 구조내려받기 xlsx 파일을 업로드하고<br>
    <strong>실행</strong>을 눌러주세요.
  </div>
</div>

</div><!-- .cols -->
</div><!-- .wrap -->

<!-- Spinner -->
<div class="spinner-overlay" id="spinner">
  <div class="spinner"></div>
  <div class="spin-msg">체크리스트 분석 중...</div>
</div>

<script>
// ── 전역 상태 ───────────────────────────────────────────────────────────────
let _data   = null;
let _curCat = null;

// ── 드래그&드롭 ─────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave',()=> dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

function setFile(f) {
  if (!f.name.toLowerCase().endsWith('.xlsx')) {
    showError('.xlsx 파일만 지원합니다.');
    return;
  }
  fileInput._file = f;
  document.getElementById('fileName').textContent = '📄 ' + f.name;
  document.getElementById('runBtn').disabled = false;
  hideError();
}

// ── 체크 실행 ────────────────────────────────────────────────────────────────
async function runCheck() {
  const f = fileInput._file || fileInput.files[0];
  if (!f) return;

  showSpinner();
  hideError();
  document.getElementById('exportBtn').style.display = 'none';

  const fd = new FormData();
  fd.append('file', f);

  try {
    const res = await fetch('/api/check', { method: 'POST', body: fd });
    const json = await res.json();
    if (json.error) { showError(json.error + (json.detail ? '\n\n' + json.detail : '')); return; }
    _data = json;
    renderAll();
  } catch (e) {
    showError('서버 오류: ' + e.message);
  } finally {
    hideSpinner();
  }
}

// ── Excel 내보내기 ─────────────────────────────────────────────────────────
function exportExcel() {
  window.location.href = '/api/export';
}

// ── 렌더링 ───────────────────────────────────────────────────────────────────
function renderAll() {
  // 요약
  const s = _data.summary;
  document.getElementById('sTotalChecks').textContent     = s.total_checks;
  document.getElementById('sTotalIssues').textContent     = s.total_issues;
  document.getElementById('sChecksWithIssues').textContent = s.checks_with_issues;
  document.getElementById('sCompanyInfo').innerHTML =
    `<b>회사명:</b> ${_data.company || '-'} &nbsp;|&nbsp; <b>보고일:</b> ${_data.report_date || '-'}` +
    (_data.parse_errors && _data.parse_errors.length
      ? `<br><span style="color:var(--warn)">⚠ 파싱 경고: ${_data.parse_errors.length}건</span>` : '');

  document.getElementById('summaryCard').style.display = '';
  document.getElementById('resultCard').style.display  = '';
  document.getElementById('emptyState').style.display  = 'none';
  document.getElementById('exportBtn').style.display   = '';

  // 카테고리 탭
  const catTabs  = document.getElementById('catTabs');
  catTabs.innerHTML = '';
  const cats = Object.keys(_data.categories);
  _curCat = cats[0];

  // 전체 탭
  const totalIssues = Object.values(_data.categories).reduce((a,c)=>a+c.total_issues,0);
  catTabs.appendChild(makeTab('전체', totalIssues, _curCat === '전체', () => {
    _curCat = null; renderChecks(); setActiveTab(null);
  }));

  cats.forEach(cn => {
    const cnt = _data.categories[cn].total_issues;
    const tab = makeTab(cn, cnt, false, () => {
      _curCat = cn; renderChecks(); setActiveTab(cn);
    });
    tab.dataset.cat = cn;
    catTabs.appendChild(tab);
  });

  renderChecks();
}

function makeTab(label, cnt, active, onClick) {
  const t = document.createElement('div');
  t.className = 'cat-tab' + (active ? ' active' : '');
  t.innerHTML = label + `<span class="cnt">${cnt}</span>`;
  t.addEventListener('click', onClick);
  return t;
}

function setActiveTab(catName) {
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active',
      catName === null ? t.textContent.startsWith('전체') : t.dataset.cat === catName);
  });
}

function renderChecks() {
  const list = document.getElementById('checkList');
  list.innerHTML = '';

  const cats = _curCat ? { [_curCat]: _data.categories[_curCat] } : _data.categories;
  Object.entries(cats).forEach(([, cat]) => {
    cat.checks.forEach(chk => {
      list.appendChild(makeCheckItem(chk));
    });
  });
}

// ── 체크 아이템 ──────────────────────────────────────────────────────────────
function makeCheckItem(chk) {
  const item = document.createElement('div');
  item.className = 'check-item';

  const badge = chk.passed
    ? `<span class="badge-cnt badge-ok">✅ 통과</span>`
    : `<span class="badge-cnt badge-err">❌ ${chk.issue_count}건</span>`;

  item.innerHTML = `
    <div class="check-header">
      <span class="check-id">${chk.id}</span>
      <span class="check-title">${chk.title}</span>
      ${badge}
      <span class="check-arrow">▼</span>
    </div>
    <div class="check-detail">
      <div class="check-desc">${chk.description}</div>
      ${chk.issues.length ? buildTable(chk) : '<div style="padding:10px 14px;font-size:11px;color:var(--success)">검출된 항목이 없습니다.</div>'}
    </div>`;

  item.querySelector('.check-header').addEventListener('click', () => {
    item.classList.toggle('open');
  });

  return item;
}

const PAGE_SIZE = 50;

function buildTable(chk) {
  const issues = chk.issues;
  const total  = chk.issue_count;
  let html = `<div class="issue-table-wrap"><table>
    <thead><tr>
      <th>연결/별도</th><th>Role 코드</th><th>Role 한글명</th>
      <th>TABLE명</th>
      <th>요소명</th><th>요소 한글명</th>
      <th>Prefix</th><th>DataType</th><th>Period</th>
      <th>구분</th><th>검토 사유</th>
    </tr></thead>
    <tbody id="tb_${chk.id}">`;

  const rows = issues.slice(0, PAGE_SIZE);
  html += rows.map(iss => `<tr>
    <td>${csTag(iss.is_consolidated)}</td>
    <td>${e(iss.role_code)}</td>
    <td title="${e(iss.role_name_ko)}">${e(iss.role_name_ko)}</td>
    <td title="${e(iss.table_name_ko)}">${e(iss.table_name_ko)}</td>
    <td title="${e(iss.element_name)}">${e(iss.element_name)}</td>
    <td title="${e(iss.label_ko)}">${e(iss.label_ko)}</td>
    <td>${e(iss.prefix)}</td>
    <td>${e(iss.data_type)}</td>
    <td>${e(iss.period)}</td>
    <td>${e(iss.gubn)}</td>
    <td title="${e(iss.reason)}">${e(iss.reason)}</td>
  </tr>`).join('');

  html += `</tbody></table></div>`;

  if (total > PAGE_SIZE) {
    html += `<button class="more-btn" onclick="loadMore(this,'${chk.id}',${PAGE_SIZE})">
      ▼ 더 보기 (${total - PAGE_SIZE}건 남음)
    </button>`;
  }
  return html;
}

function loadMore(btn, checkId, offset) {
  // 해당 체크의 issues를 _data에서 찾아 추가 렌더
  let chk = null;
  Object.values(_data.categories).forEach(cat => {
    cat.checks.forEach(c => { if (c.id === checkId) chk = c; });
  });
  if (!chk) return;

  const tbody = document.getElementById('tb_' + checkId);
  const next  = chk.issues.slice(offset, offset + PAGE_SIZE);
  next.forEach(iss => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${csTag(iss.is_consolidated)}</td>
      <td>${e(iss.role_code)}</td>
      <td title="${e(iss.role_name_ko)}">${e(iss.role_name_ko)}</td>
      <td title="${e(iss.table_name_ko)}">${e(iss.table_name_ko)}</td>
      <td title="${e(iss.element_name)}">${e(iss.element_name)}</td>
      <td title="${e(iss.label_ko)}">${e(iss.label_ko)}</td>
      <td>${e(iss.prefix)}</td>
      <td>${e(iss.data_type)}</td>
      <td>${e(iss.period)}</td>
      <td>${e(iss.gubn)}</td>
      <td title="${e(iss.reason)}">${e(iss.reason)}</td>`;
    tbody.appendChild(tr);
  });

  const newOffset = offset + PAGE_SIZE;
  const remaining = chk.issue_count - newOffset;
  if (remaining > 0) {
    btn.textContent = `▼ 더 보기 (${remaining}건 남음)`;
    btn.onclick = () => loadMore(btn, checkId, newOffset);
  } else {
    btn.remove();
  }
}

function csTag(v) {
  if (v === true)  return '<span class="tag tag-c">연결</span>';
  if (v === false) return '<span class="tag tag-s">별도</span>';
  return '<span class="tag tag-d">-</span>';
}

function e(v) {
  return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                         .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 유틸 ─────────────────────────────────────────────────────────────────────
function showSpinner() { document.getElementById('spinner').classList.add('show'); }
function hideSpinner() { document.getElementById('spinner').classList.remove('show'); }
function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg; b.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
</script>
</body>
</html>
